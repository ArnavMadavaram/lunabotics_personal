# =============================================================================
# Lunabotics Local Costmap Configuration
# Reference: Lunabotics_Software_Team-2 (Sections 4.2, 5, 6, 7)
#
# Node path: /local_costmap/costmap
# Rolling window centered on robot, updated at 10 Hz for reactive avoidance
# =============================================================================

local_costmap:
  costmap:
    ros__parameters:
      update_frequency: 10.0
      publish_frequency: 10.0

      global_frame: odom
      robot_base_frame: base_link

      rolling_window: true
      width: 5         # meters (integer required by Nav2)
      height: 5        # meters (integer required by Nav2)
      resolution: 0.05 # 5 cm/cell -> 100x100 grid

      footprint: "[[0.35, 0.30], [0.35, -0.30], [-0.35, -0.30], [-0.35, 0.30]]"
      footprint_padding: 0.05

      always_send_full_costmap: true

      # Plugin stack:
      #   voxel_layer          — near-field 3D LiDAR (3.5m danger box)
      #   crater_keepout_layer — crater grid as lethal layer (primary safety)
      #   inflation_layer      — reactive safety buffer
      plugins: ["voxel_layer", "crater_keepout_layer", "inflation_layer"]

      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: true
        publish_voxel_map: false  # disabled to save Jetson compute (Risk R4)
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 0.5
        mark_threshold: 0
        observation_sources: lidar_near
        lidar_near:
          topic: /hazards/rocks/cloud
          data_type: PointCloud2
          marking: true
          clearing: true
          obstacle_max_range: 3.5  # matches danger box forward limit (Section 7.2)
          obstacle_min_range: 0.2
          raytrace_max_range: 4.0
          raytrace_min_range: 0.0
          max_obstacle_height: 0.5
          min_obstacle_height: 0.05

      crater_keepout_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        enabled: true
        map_topic: /hazards/craters/grid
        map_subscribe_transient_local: false
        subscribe_to_updates: true

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        inflation_radius: 0.35  # slightly tighter than global for reactivity
        cost_scaling_factor: 3.0
