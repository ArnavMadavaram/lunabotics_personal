# =============================================================================
# Lunabotics Nav2 Full Stack Parameters
# Frames: map -> odom -> base_link
# =============================================================================

# ---------------------------------------------------------------------------
# Global Costmap — 4 layers, locked to full arena size 10x10m at 0.05m, 1 Hz
# ---------------------------------------------------------------------------
global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      map_topic: /map
      rolling_window: false
      width: 10
      height: 10
      resolution: 0.05
      robot_radius: 0.25
      always_send_full_costmap: true

      plugins:
        - static_layer
        - obstacle_layer
        - persistent_obstacle_layer
        - inflation_layer

      # Layer 1: arena static map from map_server
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        enabled: true
        map_topic: /map
        map_subscribe_transient_local: true
        subscribe_to_updates: false

      # Layer 2: live LiDAR obstacles — marks and clears
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        max_obstacle_height: 0.5
        observation_sources: lidar_scan
        lidar_scan:
          topic: /unilidar/cloud_processed
          data_type: PointCloud2
          marking: true
          clearing: true
          max_obstacle_height: 0.5
          min_obstacle_height: 0.02
          obstacle_max_range: 4.0
          obstacle_min_range: 0.2
          raytrace_max_range: 5.0
          raytrace_min_range: 0.0

      # Layer 3: persistent obstacles — rocks mapped once stay forever (no clearing)
      persistent_obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        track_unknown_space: false
        max_obstacle_height: 0.5
        observation_sources: lidar_persistent
        lidar_persistent:
          topic: /unilidar/cloud_processed
          data_type: PointCloud2
          marking: true
          clearing: false
          max_obstacle_height: 0.5
          min_obstacle_height: 0.02
          obstacle_max_range: 4.0
          obstacle_min_range: 0.2
          raytrace_max_range: 5.0
          raytrace_min_range: 0.0

      # Layer 4: inflate all lethal obstacles
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        inflation_radius: 0.30
        cost_scaling_factor: 3.0

# ---------------------------------------------------------------------------
# Local Costmap — 3 layers, 5x5m rolling, 5 Hz
# ---------------------------------------------------------------------------
local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 5.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 5
      height: 5
      resolution: 0.05
      robot_radius: 0.25
      always_send_full_costmap: true

      plugins:
        - obstacle_layer
        - hazard_layer
        - inflation_layer

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        max_obstacle_height: 0.5
        observation_sources: lidar_scan
        lidar_scan:
          topic: /unilidar/cloud_processed
          data_type: PointCloud2
          marking: true
          clearing: true
          max_obstacle_height: 0.5
          min_obstacle_height: 0.02
          obstacle_max_range: 3.5
          obstacle_min_range: 0.2
          raytrace_max_range: 4.0
          raytrace_min_range: 0.0

      hazard_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        enabled: true
        map_topic: /hazards/craters/grid
        map_subscribe_transient_local: false
        subscribe_to_updates: true

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        inflation_radius: 0.30
        cost_scaling_factor: 3.0

# ---------------------------------------------------------------------------
# Planner Server — SmacPlannerHybrid (Reeds-Shepp, no reversing via Dubin)
# ---------------------------------------------------------------------------
planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_smac_planner/SmacPlannerHybrid"
      downsample_costmap: false
      downsampling_factor: 1
      tolerance: 0.15
      allow_unknown: true
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 5.0
      motion_model_for_search: "DUBIN"   # no reversing
      angle_quantization_bins: 72
      analytic_expansion_ratio: 3.5
      analytic_expansion_max_length: 3.0
      minimum_turning_radius: 0.4
      reverse_penalty: 2.0
      change_penalty: 0.0
      non_straight_penalty: 1.2
      cost_penalty: 2.0
      retrospective_penalty: 0.015
      lookup_table_size: 20.0
      cache_obstacle_heuristic: false
      debug_visualizations: false
      smooth_path: true
      smoother:
        max_iterations: 1000
        w_smooth: 0.3
        w_data: 0.2
        tolerance: 1.0e-10
        do_refinement: true
        refinement_num: 2

# ---------------------------------------------------------------------------
# Controller Server — RegulatedPurePursuit
# ---------------------------------------------------------------------------
controller_server:
  ros__parameters:
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.15
      yaw_goal_tolerance: 0.25
      stateful: true

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.3
      min_linear_vel: 0.05
      lookahead_dist: 0.6
      min_lookahead_dist: 0.3
      max_lookahead_dist: 0.9
      lookahead_time: 1.5
      use_velocity_scaled_lookahead_dist: true
      use_regulated_linear_velocity_scaling: true
      regulated_linear_scaling_min_radius: 0.9
      regulated_linear_scaling_min_speed: 0.25
      use_cost_regulated_linear_velocity_scaling: true
      inflation_cost_scaling_factor: 3.0
      cost_scaling_dist: 0.3
      cost_scaling_gain: 1.0
      transform_tolerance: 0.1
      max_angular_accel: 3.2
      rotate_to_heading_angular_vel: 1.8
      allow_reversing: false
      max_robot_pose_search_dist: 10.0
      use_interpolation: true

# ---------------------------------------------------------------------------
# Behavior Server — spin, backup, wait, drive_on_heading
# ---------------------------------------------------------------------------
behavior_server:
  ros__parameters:
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    local_costmap_topic: /local_costmap/costmap_raw
    local_footprint_topic: /local_costmap/published_footprint
    global_frame: odom
    robot_base_frame: base_link
    transform_timeout: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2
    # Recovery distances / speeds
    spin_dist: 1.57
    backup_dist: 0.5
    backup_speed: 0.1

# ---------------------------------------------------------------------------
# BT Navigator — default NavigateToPose BT XML
# ---------------------------------------------------------------------------
bt_navigator:
  ros__parameters:
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odometry/filtered
    default_nav_to_pose_bt_xml: ""
    goal_reached_tol: 0.15
    bt_loop_duration: 10
    default_server_timeout: 20
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator/NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator/NavigateThroughPosesNavigator"

# ---------------------------------------------------------------------------
# Lifecycle Manager — navigation nodes (managed by navigation_launch.py)
# ---------------------------------------------------------------------------
lifecycle_manager:
  ros__parameters:
    use_sim_time: false
    autostart: true
    node_names:
      - controller_server
      - planner_server
      - behavior_server
      - bt_navigator
